<!DOCTYPE html>
<html>
<head>
    <title>Government Document Translator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
        }

        .result {
            margin-top: 30px;
            padding: 15px;
            background-color: #f4f4f4;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Government Document Translator</h1>

    <form method="POST">
        <label>Enter Text:</label><br><br>
        <textarea name="text" required></textarea><br>
        <button type="submit">Translate</button>
    </form>

    {% if translated_text %}
    <div class="result">
        <h3>Translated Text:</h3>
        <p>{{ translated_text }}</p>
    </div>
    {% endif %}

</body>
</html>
